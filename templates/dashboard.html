<!DOCTYPE html>
<html>
<head>
<title>AI SOC Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#0f172a,#020617);
    color:white;
}

.light {
    background:white;
    color:black;
}

.header {
    display:flex;
    justify-content:space-between;
    padding:15px;
}

.container {
    display:flex;
    gap:20px;
    padding:20px;
}

.card {
    flex:1;
    padding:15px;
    border-radius:15px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(10px);
}

.alert {
    padding:10px;
    margin:5px;
    border-radius:8px;
}

.high{background:red;}
.medium{background:orange;}
.low{background:green;}

#map{height:300px;}
</style>
</head>

<body>

<div class="header">
<h2>🚀 AI SOC Dashboard</h2>
<div>
<input id="search" placeholder="Search IP">
<button onclick="toggleMode()">🌗</button>
<button onclick="exportCSV()">💾</button>
</div>
</div>

<div class="container">

<div class="card">
<h3>🚨 Alerts</h3>
<div id="alerts"></div>

<h3>🧠 AI</h3>
<div id="ai"></div>

<h3>📊 Stats</h3>
<canvas id="chart"></canvas>
</div>

<div class="card">
<h3>🌍 Attack Map</h3>
<div id="map"></div>
</div>

</div>

<script>
let map = L.map('map').setView([20,0],2)
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map)

function toggleMode(){
    document.body.classList.toggle("light")
}

function exportCSV(){
    window.location="/export"
}

async function load(){
    let res = await fetch('/alerts')
    let data = await res.json()

    let search = document.getElementById("search").value

    let html=""
    let high=0, med=0, low=0

    map.eachLayer(l=>{
        if(l instanceof L.Marker || l instanceof L.CircleMarker){
            map.removeLayer(l)
        }
    })

    data.forEach(a=>{
        if(search && !a.ip.includes(search)) return

        html+=`<div class="alert ${a.level}">
        ${a.ip} | ${a.level} | ${a.threat_score}
        </div>`

        if(a.level=="high") high++
        else if(a.level=="medium") med++
        else low++

        if(a.lat && a.lon){
            L.circleMarker([a.lat,a.lon]).addTo(map)
        }
    })

    document.getElementById("alerts").innerHTML=html

    new Chart(document.getElementById("chart"), {
        type:'doughnut',
        data:{
            labels:['High','Medium','Low'],
            datasets:[{data:[high,med,low]}]
        }
    })

    let ai = await fetch('/ai')
    let aiData = await ai.json()
    document.getElementById("ai").innerText = aiData.msg
}

setInterval(load,4000)
load()
</script>

</body>
</html>
