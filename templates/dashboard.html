<!DOCTYPE html>
<html>
<head>
<title>AI SOC Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body {
    background: #0b1220;
    color: white;
    font-family: Arial;
}

.header {
    display:flex;
    justify-content: space-between;
    margin-bottom:20px;
}

.card {
    background: rgba(255,255,255,0.05);
    padding:15px;
    border-radius:10px;
    margin-bottom:20px;
}

.alert {
    padding:10px;
    margin:5px;
    border-radius:6px;
    font-size:14px;
}

.high { background:#ff3b3b; }
.medium { background:#f59e0b; }

.container {
    display:flex;
    gap:20px;
}

#map { height:350px; }
</style>
</head>

<body>

<div class="header">
<h1>🚀 AI SOC Dashboard</h1>
<input id="search" placeholder="Search IP">
</div>

<div class="container">

<div class="card" style="width:50%">
<h3>🔥 Live Alerts</h3>
<div id="alerts"></div>
</div>

<div class="card" style="width:50%">
<h3>🌍 Attack Map</h3>
<div id="map"></div>
</div>

</div>

<script>
let map = L.map('map').setView([20,0],2);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

function loadData(){
fetch('/alerts')
.then(res=>res.json())
.then(data=>{

    let html = "";

    map.eachLayer(layer=>{
        if(layer instanceof L.Circle) map.removeLayer(layer);
    });

    data.forEach(a=>{
        html += `<div class="alert ${a.level}">
        ⏱ ${a.time} | 🖥 ${a.agent} | 🌐 ${a.ip}<br>
        ⚠ ${a.desc}<br>
        🎯 ${a.mitre}
        </div>`;

        L.circle([a.lat,a.lon],{radius:40000}).addTo(map);
    });

    document.getElementById("alerts").innerHTML = html;
});
}

setInterval(loadData,3000);
</script>

</body>
</html>
