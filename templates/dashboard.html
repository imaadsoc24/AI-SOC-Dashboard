<!DOCTYPE html>
<html>
<head>
<title>AI SOC Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    background: #0f172a;
    color: white;
    font-family: Arial;
}
.container {
    display: flex;
    gap: 20px;
}
.card {
    background: rgba(255,255,255,0.05);
    padding: 15px;
    border-radius: 10px;
    width: 45%;
}
.alert {
    padding: 10px;
    margin: 5px;
    border-radius: 5px;
}
.high { background: red; }
.medium { background: orange; }
#map { height: 300px; }
</style>
</head>

<body>

<h1>🚀 AI SOC Dashboard</h1>

<input id="search" placeholder="Search IP">
<button onclick="exportCSV()">Export CSV</button>

<div class="container">

<div class="card">
<h3>Alerts</h3>
<div id="alerts"></div>
</div>

<div class="card">
<h3>Attack Map</h3>
<div id="map"></div>
</div>

</div>

<div class="card">
<h3>Threat Chart</h3>
<canvas id="chart"></canvas>
</div>

<script>
let map = L.map('map').setView([20,0],2);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

function loadData(){
fetch('/alerts')
.then(res=>res.json())
.then(data=>{
    let html='';
    let high=0, med=0;

    map.eachLayer(layer=>{
        if(layer instanceof L.Circle) map.removeLayer(layer);
    });

    data.forEach(a=>{
        html += `<div class="alert ${a.level}">
        ${a.time} | ${a.ip} | ${a.level} | Score:${a.threat_score} | ${a.mitre}
        </div>`;

        L.circle([a.lat,a.lon],{radius:50000}).addTo(map);

        if(a.level=="high") high++;
        else med++;
    });

    document.getElementById('alerts').innerHTML = html;

    new Chart(document.getElementById("chart"), {
        type: 'bar',
        data: {
            labels:["High","Medium"],
            datasets:[{data:[high,med]}]
        }
    });
});
}

function exportCSV(){
window.location="/export";
}

setInterval(loadData,3000);
</script>

</body>
</html>
