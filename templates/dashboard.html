<!DOCTYPE html>
<html>
<head>
<title>AI SOC Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body {
    background:#0b1220;
    color:white;
    font-family:Arial;
}

.header {
    display:flex;
    justify-content:space-between;
    padding:10px;
}

button {
    padding:5px 10px;
    margin:5px;
}

.container {
    display:flex;
}

.left { width:40%; }
.right { width:60%; }

.card {
    background:#111827;
    padding:10px;
    margin:10px;
    border-radius:10px;
}

.alert { padding:8px; margin:5px; border-radius:8px; }
.high { background:red; }
.medium { background:orange; }
.low { background:green; }

#map { height:400px; }
</style>
</head>

<body>

<div class="header">
<h2>🚀 AI SOC Dashboard</h2>
<div>
<button onclick="toggleTheme()">🌙 Mode</button>
<input id="search" placeholder="Search IP..." onkeyup="filterAlerts()">
</div>
</div>

<div class="container">

<div class="left">

<div class="card">
<h3>📊 Stats</h3>
Total: <span id="total">0</span><br>
High: <span id="high">0</span><br>
Medium: <span id="medium">0</span><br>
Low: <span id="low">0</span>
</div>

<div class="card">
<h3>🧠 AI Insights</h3>
<div id="ai"></div>
</div>

<div class="card">
<h3>🚨 Alerts</h3>
<div id="alerts"></div>
</div>

</div>

<div class="right">
<div class="card">
<h3>🌍 Real Attack Map</h3>
<div id="map"></div>
</div>
</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
let map = L.map('map').setView([20,0],2);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let allAlerts = [];

async function load(){
    let res = await fetch('/alerts');
    let data = await res.json();
    allAlerts = data;

    let alertsDiv = document.getElementById("alerts");
    alertsDiv.innerHTML = "";

    let high=0,medium=0,low=0;

    data.forEach(a=>{
        if(a.level=="high") high++;
        if(a.level=="medium") medium++;
        if(a.level=="low") low++;

        alertsDiv.innerHTML += `
        <div class="alert ${a.level}">
        ${a.time} | ${a.ip} | ${a.level.toUpperCase()} | ${a.threat_score}%
        </div>`;

        // Fake geo coords
        let lat = Math.random()*140 - 70;
        let lon = Math.random()*360 - 180;

        L.circleMarker([lat, lon]).addTo(map);
    });

    document.getElementById("total").innerText=data.length;
    document.getElementById("high").innerText=high;
    document.getElementById("medium").innerText=medium;
    document.getElementById("low").innerText=low;

    document.getElementById("ai").innerHTML =
        high>5 ? "⚠️ High attack activity" : "✅ System stable";
}

function filterAlerts(){
    let q = document.getElementById("search").value.toLowerCase();
    let filtered = allAlerts.filter(a => a.ip.includes(q));

    let alertsDiv = document.getElementById("alerts");
    alertsDiv.innerHTML = "";

    filtered.forEach(a=>{
        alertsDiv.innerHTML += `
        <div class="alert ${a.level}">
        ${a.time} | ${a.ip}
        </div>`;
    });
}

function toggleTheme(){
    document.body.style.background =
        document.body.style.background=="white" ? "#0b1220" : "white";
}

setInterval(load,3000);
load();
</script>

</body>
</html>
